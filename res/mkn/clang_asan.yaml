property:
  cxx_flags: -std=c++20 -fsanitize=address -fno-omit-frame-pointer
local:
  repo: /mkn/r
  mod-repo: /mkn/m
remote:
  repo: git@github.com:mkn/
  mod-repo: git@github.com:mkn-mod/
path: |
  /usr/lib/llvm-19/lib/clang/19/lib/linux

#/usr/lib/clang/18/lib/x86_64-redhat-linux-gnu
env: | # replace with $(clang++ -print-file-name=libclang_rt.asan-x86_64.so)
  MKN_LD_PRELOAD=/usr/lib/llvm-19/lib/clang/19/lib/linux/libclang_rt.asan-x86_64.so
  ASAN_OPTIONS=detect_leaks=0

compiler:
  mask:
    clang++:
      clang++-19
file:
  - type: cpp:cxx:cc:c:S
    archiver: ar -cr
    compiler: ccache clang++-19 ${cxx_flags}
    linker: clang++-19 -Bmold -lclang_rt.asan-x86_64
