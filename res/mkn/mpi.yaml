property:
  cxx_flags: >-
    -std=c++20 -DPHARE_DIAG_DOUBLES=1
#-DPHARE_LOG_SCOPE_PRINT=1 -DPHARE_LOG_LEVEL=2 -fsanitize=address -fno-omit-frame-pointer
# -fsanitize-memory-track-origins -fsanitize=memory

local:
  repo: /mkn/r
  mod-repo: /mkn/m
remote:
  repo: git@github.com:mkn/
  mod-repo: git@github.com:mkn-mod/

env: |
  PATH=/opt/mpi/host/bin:${PATH}
  OMPI_CXX=clang++

#PATH=/opt/c/gcc-15.1.0/bin:/opt/mpi/host/bin:${PATH}

#  OMPI_CXX=clang++




compiler:
  mask:
    g++:
      mpicxx
file:
  - type: cpp:cxx:cc
    archiver: ar -cr
    compiler: mpicxx ${cxx_flags}
    linker: mpicxx ${cxx_flags}
